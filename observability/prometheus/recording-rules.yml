# Prometheus recording rules — pre-compute common AgentPulse metrics for fast dashboards

groups:
  - name: agentpulse_api
    interval: 30s
    rules:
      - record: ap:checkins_total:rate5m
        expr: rate(agentpulse_checkins_total[5m])

      - record: ap:checkins_failed:rate5m
        expr: rate(agentpulse_checkins_failed_total[5m])

      - record: ap:checkin_errors:rate5m
        expr: rate(agentpulse_checkin_errors_total[5m])

      - record: ap:incidents_open:count
        expr: sum by (severity) (ap:incidents_status{status="open"})

      - record: ap:remediations_success:rate5m
        expr: rate(agentpulse_remediations_total{status="success"}[5m])

      - record: ap:remediations_failed:rate5m
        expr: rate(agentpulse_remediations_total{status="failed"}[5m])

      - record: ap:agents_online:count
        expr: sum(ap:agent_status{status="online"})

      - record: ap:agents_offline:count
        expr: sum(ap:agent_status{status="offline"})

      - record: ap:offline_queue_depth:p95
        expr: histogram_quantile(0.95, rate(agentpulse_offline_queue_depth_bucket[5m]))

      - record: ap:api_request_duration_seconds:p95
        expr: histogram_quantile(0.95, rate(agentpulse_http_request_duration_seconds_bucket[5m]))

      - record: ap:api_requests_total:rate5m
        expr: rate(agentpulse_http_requests_total[5m])

  - name: agentpulse_worker
    interval: 30s
    rules:
      - record: ap:jobs_queued:count
        expr: sum(ap:worker_jobs_queued)

      - record: ap:jobs_failed:rate5m
        expr: rate(agentpulse_worker_jobs_failed_total[5m])

      - record: ap:dead_letter:count
        expr: sum(ap:worker_dead_letter_count)

      - record: ap:job_processing_duration_seconds:p95
        expr: histogram_quantile(0.95, rate(agentpulse_worker_job_duration_seconds_bucket[5m]))

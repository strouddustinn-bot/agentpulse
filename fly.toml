app = "agentpulse-stroud"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PULSE_DB = "/data/pulse.db"
  PULSE_STATE_FILE = "/data/state.json"
  PULSE_WEB_DIST = "/app/web/dist"
  PULSE_READ_USER = "agentpulse"
  PUBLIC_BASE_URL = "https://agentpulse-stroud.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[mounts]
  source = "agentpulse_data"
  destination = "/data"
  initial_size = "1gb"

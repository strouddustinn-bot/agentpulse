# AgentPulse — Production Compose
# Usage: docker compose -f docker-compose.yml up -d

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: agentpulse/agent:0.1.0
    container_name: agentpulse-agent
    environment:
      AGENTPULSE_BACKEND_URL: http://backend:8088
      AGENTPULSE_CONFIG_PATH: /etc/agentpulse/agentpulse.json
      AGENTPULSE_CREDENTIAL_PATH: /etc/agentpulse/credentials.json
      AGENTPULSE_STATE_DIR: /var/lib/agentpulse
      AGENTPULSE_LOG_DIR: /var/log/agentpulse
      AGENTPULSE_LOG_LEVEL: INFO
    volumes:
      - agent-config:/etc/agentpulse
      - agent-state:/var/lib/agentpulse
      - agent-logs:/var/log/agentpulse
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentpulse

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: agentpulse/backend:0.1.0
    container_name: agentpulse-backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8088
      DATABASE_URL: sqlite+aiosqlite:///var/lib/agentpulse/agentpulse.db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENROLLMENT_SECRET: ${ENROLLMENT_SECRET:?ENROLLMENT_SECRET required}
    volumes:
      - backend-state:/var/lib/agentpulse
    ports:
      - "8088:8088"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentpulse

  dashboard:
    build:
      context: ./dashboard/web
      dockerfile: ../../Dockerfile
    image: agentpulse/dashboard:0.1.0
    container_name: agentpulse-dashboard
    environment:
      VITE_API_URL: http://backend:8088
      VITE_WS_URL: ws://backend:8088
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - agentpulse

volumes:
  agent-config:
  agent-state:
  agent-logs:
  backend-state:

networks:
  agentpulse:
    driver: bridge

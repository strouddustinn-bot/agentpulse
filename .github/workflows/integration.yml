name: Contract Integration

on:
  push:
    branches: [main, 'productization/**']
    paths: ['agent/**', 'control-plane/**', 'packages/contracts/**', 'scripts/**']
  pull_request:
    paths: ['agent/**', 'control-plane/**', 'packages/contracts/**', 'scripts/**']

jobs:
  static-contract-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install contract validators
        run: python -m pip install PyYAML jsonschema
      - name: Validate shared contracts
        run: python scripts/validate-contracts.py
      - name: Validate shell scripts
        run: |
          set -e
          find scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Check retired runtime paths are absent
        run: |
          test ! -e backend
          test ! -e dashboard/web
          test ! -e dashboard/pulse_server
          test ! -e docker-compose.yml
          test ! -e fly.toml

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install PyYAML jsonschema
      - run: python agent/tools/run_tests.py
      - run: python scripts/validate-contracts.py
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: control-plane
      - run: npm test && npm run typecheck && npm run types:check
        working-directory: control-plane
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  release-control-plane:
    name: Deploy control plane to Cloudflare
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: control-plane
          command: deploy --env production

  github-release:
    name: Create GitHub release
    needs: [verify, release-control-plane]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "## AgentPulse v$VERSION" > release-notes.md
          git log --oneline "v${VERSION#v}"..HEAD >> release-notes.md || true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            CHANGELOG.md
            release-notes.md

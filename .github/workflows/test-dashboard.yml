name: Dashboard

on:
  push:
    branches: [main, 'productization/**']
    paths: ['dashboard/**']
  pull_request:
    paths: ['dashboard/**']

concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-test:
    name: Web (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ['20', '22']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Install dependencies
        run: cd dashboard/web && npm ci

      - name: Type-check
        run: cd dashboard/web && npx tsc --noEmit

      - name: Lint
        run: cd dashboard/web && npm run lint --if-present

      - name: Build
        run: cd dashboard/web && npm run build

  backend-test:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r dashboard/backend/requirements.txt
          pip install -q pytest httpx

      - name: Run tests
        run: |
          cd dashboard/backend && \
          python3 -m pytest tests/ -v --tb=short -q || \
          echo "No tests yet"

name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run agent test suite
        run: cd agent && python3 tools/run_tests.py
      - name: Install backend test dependencies
        run: python -m pip install -e backend
      - name: Run backend test suite
        run: python -m unittest discover backend/tests

  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: control-plane/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run types:check

  dashboard-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

name: Security

on:
  push:
    branches: [main]
    paths: ['agent/**', 'control-plane/**', 'dashboard/**', 'packages/**', 'scripts/**']
  pull_request:
    paths: ['agent/**', 'control-plane/**', 'dashboard/**', 'packages/**', 'scripts/**']
  schedule:
    - cron: '0 0 * * 0'

jobs:
  secrets:
    name: Secret scanning
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  dependency-scan:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify dependency-free agent metadata
        run: |
          python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              project = tomllib.load(handle)["project"]
          dependencies = project.get("dependencies", [])
          if dependencies:
              raise SystemExit(f"unexpected agent runtime dependencies: {dependencies}")
          print("Agent runtime dependencies: none")
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit Worker dependencies
        working-directory: control-plane
        run: npm audit --audit-level=high
      - name: Audit dashboard dependencies
        working-directory: dashboard
        run: npm audit --audit-level=high

  harden-check:
    name: Repository hardening
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Check node_modules are not tracked
        run: test -z "$(git ls-files '*/node_modules/*')"
      - name: Check credentials are not committed
        run: |
          ! grep -RInE '(sk_live_|whsec_[A-Za-z0-9]|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH) PRIVATE KEY)' \
            agent/agentpulse control-plane/src dashboard/src packages/contracts configs scripts docs \
            --exclude='*.md' --exclude-dir='node_modules'

name: Backend

on:
  push:
    branches: [main, 'productization/**']
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r backend/requirements.txt
          pip install -q pytest pytest-asyncio httpx

      - name: Run backend tests
        run: cd backend && python3 -m pytest tests/ -v --tb=short -q

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install -q ruff
      - name: Lint backend
        run: ruff check backend/ --output-format=text

  build:
    name: Docker Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t agentpulse/backend:test backend/

      - name: Smoke-test container
        run: |
          docker run --rm agentpulse/backend:test \
            python3 -c "import agentpulse_backend; print('import OK')"
